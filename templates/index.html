<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Navis – AI Assistant | Robo Manthan</title>
    <meta name="description"
        content="Navis – Intelligent AI Assistant by Robo Manthan. Ask questions via text or voice.">
    <!-- Cross-platform PWA support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Navis">
    <meta name="theme-color" content="#080b1a">
    <meta name="msapplication-TileColor" content="#080b1a">
    <link rel="apple-touch-icon" href="/static/images/robomanthan_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/images/robomanthan_logo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Camera Feed Integration Styles */
        .camera-wrapper {
            width: 100%;
            height: 28vh; /* Responsive height */
            min-height: 220px;
            background: #000;
            display: flex;
            justify-content: center;
            border-bottom: 2px solid rgba(0, 242, 254, 0.4);
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            z-index: 5;
        }
        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* Ensure the main content allows the chat container to take remaining space */
        .main-content {
            display: flex; flex-direction: column; overflow: hidden;
        }
        /* Tab Styles */
        .mode-tabs {
            display: flex;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            z-index: 10;
        }
        .mode-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
        }
        .mode-tab.active {
            color: #00f2fe;
            background: rgba(0, 242, 254, 0.1);
            border-bottom: 2px solid #00f2fe;
        }
    </style>
</head>

<body>

    <!-- Ambient Background -->
    <div class="bg-glow">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <!-- Overlay for training panel -->
    <div class="overlay" id="overlay"></div>

    <div class="app-container">

        <!-- ── Navbar ─────────────────────────────────────── -->
        <nav class="navbar">
            <div class="nav-brand">
                <div class="brand-text" style="margin-left: 10px;">
                    <h1 class="brand-name">NAVIS</h1>
                    <span class="brand-tagline">AI Assistant</span>
                </div>
            </div>
            <div class="nav-actions">
                <button class="nav-btn train-btn" id="trainToggle">
                    <span class="btn-icon">🧠</span>
                    <span class="btn-text">Train</span>
                </button>
                <button class="nav-btn reset-btn" id="resetBtn" title="New Chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 1 3 6.7" />
                        <path d="M3 22v-6h6" />
                    </svg>
                </button>
            </div>
        </nav>

        <!-- ── Mode Tabs ──────────────────────────────────── -->
        <div class="mode-tabs">
            <button class="mode-tab active" id="tabChatbot">
                💬 Chatbot Mode
            </button>
            <button class="mode-tab" id="tabFollower">
                👀 Follower Mode
            </button>
            <button class="mode-tab" id="tabManual">
                🎮 Manual Mode
            </button>
        </div>

        <!-- ── Dynamic Content Area ───────────────────────── -->
        <main class="main-content">
            
            <!-- Follower Mode View -->
            <div id="followerSection" style="display: none; flex-direction: column; height: 100%;">
                <div class="camera-wrapper" style="height: 100%; max-height: 60vh;">
                    <img src="/video_feed" class="camera-feed" id="cameraFeed" alt="Robot Vision Feed Offline" onerror="this.style.display='none'">
                </div>
                <div style="padding: 20px;">
                    <button class="estop-btn-red" id="estopBtnFollower" style="background-color: #ff0033; color: white; border: 2px solid rgba(255,255,255,0.5); border-radius: 12px; padding: 20px; font-weight: 800; font-size: 20px; cursor: pointer; box-shadow: 0 8px 30px rgba(255,0,50,0.6); width: 100%; transition: transform 0.1s;">
                        🛑 EMERGENCY STOP 🛑
                    </button>
                </div>
            </div>

            <!-- Manual Mode View -->
            <div id="manualSection" style="display: none; flex-direction: column; height: 100%; overflow-y: auto;">
                <div class="camera-wrapper" style="height: 100%; max-height: 40vh;">
                    <img src="/video_feed" class="camera-feed" id="cameraFeedManual" alt="Robot Vision Feed Offline" onerror="this.style.display='none'">
                </div>
                <div style="padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; flex: 1;">
                    <div style="width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 10px;">
                        <label for="manualSpeed" style="color: rgba(255,255,255,0.8); font-size: 14px; display: flex; justify-content: space-between;">
                            <span>Speed</span>
                            <span id="speedValue">80</span>
                        </label>
                        <input type="range" id="manualSpeed" min="40" max="150" value="80" style="width: 100%; cursor: pointer;">
                    </div>
                    
                    <div class="d-pad" style="display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(3, 70px); gap: 10px; margin: 10px 0;">
                        <button class="d-pad-btn" data-action="fwd_left" style="border-radius: 10px 0 0 0; background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); color: white; font-size: 20px; cursor: pointer;">↖</button>
                        <button class="d-pad-btn" data-action="forward" style="border-radius: 10px 10px 0 0; background: rgba(0, 242, 254, 0.2); border: 1px solid rgba(0, 242, 254, 0.5); color: white; font-size: 24px; cursor: pointer;">▲</button>
                        <button class="d-pad-btn" data-action="fwd_right" style="border-radius: 0 10px 0 0; background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); color: white; font-size: 20px; cursor: pointer;">↗</button>
                        
                        <button class="d-pad-btn" data-action="left" style="background: rgba(0, 242, 254, 0.2); border: 1px solid rgba(0, 242, 254, 0.5); color: white; font-size: 24px; cursor: pointer;">◀</button>
                        <button class="d-pad-btn stop-action-btn" data-action="stop" style="border-radius: 50%; background: #ff0033; border: 2px solid rgba(255,255,255,0.3); color: white; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 0 15px rgba(255,0,50,0.5);">STOP</button>
                        <button class="d-pad-btn" data-action="right" style="background: rgba(0, 242, 254, 0.2); border: 1px solid rgba(0, 242, 254, 0.5); color: white; font-size: 24px; cursor: pointer;">▶</button>
                        
                        <button class="d-pad-btn" data-action="bwd_left" style="border-radius: 0 0 0 10px; background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); color: white; font-size: 20px; cursor: pointer;">↙</button>
                        <button class="d-pad-btn" data-action="backward" style="border-radius: 0 0 10px 10px; background: rgba(0, 242, 254, 0.2); border: 1px solid rgba(0, 242, 254, 0.5); color: white; font-size: 24px; cursor: pointer;">▼</button>
                        <button class="d-pad-btn" data-action="bwd_right" style="border-radius: 0 0 10px 0; background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); color: white; font-size: 20px; cursor: pointer;">↘</button>
                    </div>

                    <button class="estop-btn-red" id="estopBtnManual" style="background-color: #ff0033; color: white; border: 2px solid rgba(255,255,255,0.5); border-radius: 12px; padding: 20px; font-weight: 800; font-size: 20px; cursor: pointer; box-shadow: 0 8px 30px rgba(255,0,50,0.6); width: 100%; max-width: 300px; transition: transform 0.1s;">
                        🛑 EMERGENCY STOP 🛑
                    </button>
                </div>
            </div>

            <!-- Chatbot Mode View -->
            <div id="chatbotSection" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
                <div class="chat-container" id="chatContainer">
                    <div class="messages" id="messages">
                        <!-- Welcome Message -->
                        <div class="welcome-hero" id="welcomeHero">
                            <h2 class="welcome-title">Hello, I'm <span class="accent">Navis</span></h2>
                        <p class="welcome-sub">Your AI assistant by Robo Manthan. Ask me anything through text or voice!
                        </p>
                        <div class="quick-actions">
                            <button class="quick-btn" data-msg="Who are you?">🤖 Who are you?</button>
                            <button class="quick-btn" data-msg="What is Robo Manthan?">🏢 About Robo Manthan</button>
                            <button class="quick-btn" data-msg="Tell me a joke">😄 Tell me a joke</button>
                            <button class="quick-btn" data-msg="What can you do?">✨ What can you do?</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- ── Input Area ─────────────────────────────────── -->
        <footer class="input-area" id="inputArea">
            <div class="input-wrapper">
                <div class="tts-toggle" id="ttsToggle" title="Toggle voice replies">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.5 4.5 0 0 0 2.5-3.5zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06A9 9 0 0 0 14 3.23z" />
                    </svg>
                </div>
                <textarea id="userInput" placeholder="Ask Navis anything..." rows="1"></textarea>
                <div class="input-actions">
                    <select id="langSelect" class="lang-select" title="Spoken Language">
                        <option value="en-IN">EN</option>
                        <option value="hi-IN">HI</option>
                        <option value="kn-IN">KN</option>
                    </select>
                    <button class="voice-btn" id="voiceBtn" title="Click to speak">
                        <svg class="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                            <path
                                d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                        </svg>
                        <div class="pulse-ring"></div>
                    </button>
                    <button class="send-btn" id="sendBtn" title="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                        </svg>
                    </button>
                    <button class="stop-btn" id="stopBtn" title="Stop response" style="display:none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2" />
                        </svg>
                    </button>
                </div>
            </div>
            <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
        </footer>

    </div>

    <!-- ── Training Panel ─────────────────────────────────── -->
    <aside class="training-panel" id="trainingPanel">
        <div class="panel-header">
            <h2>🧠 Train Navis</h2>
            <button class="close-panel" id="closeTraining">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                </svg>
            </button>
        </div>
        <div class="panel-body">
            <p class="panel-desc">Teach Navis to answer personal questions. Trained answers are prioritized over AI
                responses.</p>
            <div class="train-form">
                <div class="form-group">
                    <label for="trainQuestion">Question</label>
                    <textarea id="trainQuestion" placeholder="e.g. Who is the team leader?" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label for="trainAnswer">Answer</label>
                    <textarea id="trainAnswer" placeholder="e.g. Rahul is the team leader of Robo Manthan."
                        rows="3"></textarea>
                </div>
                <button class="btn btn-primary" id="addTraining">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                    </svg>
                    Add Training
                </button>
            </div>
            <div class="training-divider">
                <span>Trained Knowledge</span>
            </div>
            <div class="training-list" id="trainingList">
                <!-- Populated by JS -->
            </div>
        </div>
    </aside>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/app.js"></script>
    <script>
        // Tab Mode Switcher
        const tabChatbot = document.getElementById('tabChatbot');
        const tabFollower = document.getElementById('tabFollower');
        const tabManual = document.getElementById('tabManual');
        const chatbotSection = document.getElementById('chatbotSection');
        const followerSection = document.getElementById('followerSection');
        const manualSection = document.getElementById('manualSection');
        const inputArea = document.getElementById('inputArea');

        function switchMode(mode) {
            // First hide everything and remove active classes
            tabChatbot.classList.remove('active');
            tabFollower.classList.remove('active');
            if(tabManual) tabManual.classList.remove('active');
            
            chatbotSection.style.display = 'none';
            followerSection.style.display = 'none';
            if(manualSection) manualSection.style.display = 'none';

            if (mode === 'chatbot') {
                tabChatbot.classList.add('active');
                chatbotSection.style.display = 'flex';
                if(inputArea) inputArea.style.display = 'block';
            } else if (mode === 'follower') {
                tabFollower.classList.add('active');
                followerSection.style.display = 'flex';
                if(inputArea) inputArea.style.display = 'none';
            } else if (mode === 'manual' && manualSection) {
                tabManual.classList.add('active');
                manualSection.style.display = 'flex';
                if(inputArea) inputArea.style.display = 'none';
            }
            
            // Notify Backend
            fetch('/api/mode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: mode })
            }).catch(e => console.error("Mode switch failed:", e));
        }

        tabChatbot.addEventListener('click', () => switchMode('chatbot'));
        tabFollower.addEventListener('click', () => switchMode('follower'));
        if(tabManual) tabManual.addEventListener('click', () => switchMode('manual'));

        // Background Init (ensure default matches Backend)
        switchMode('chatbot');

        // Emergency Stop Handler
        document.querySelectorAll('.estop-btn-red').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.style.transform = 'scale(0.95)');
            btn.addEventListener('mouseup', () => btn.style.transform = 'scale(1)');
            btn.addEventListener('mouseleave', () => btn.style.transform = 'scale(1)');
            btn.addEventListener('click', async () => {
                try {
                    await fetch('/api/estop', { method: 'POST' });
                    // Visual feedback
                    const toastContainer = document.getElementById('toastContainer');
                    if (toastContainer) {
                        const t = document.createElement('div');
                        t.className = 'toast error'; 
                        t.textContent = '🛑 Emergency Stop Activated';
                        t.style.backgroundColor = '#ff0033';
                        t.style.color = '#fff';
                        toastContainer.appendChild(t);
                        setTimeout(() => t.remove(), 3200);
                    }
                } catch (e) {
                    console.error("ESTOP failed", e);
                }
            });
        });

        // Manual controls logic
        const dPadBtns = document.querySelectorAll('.d-pad-btn');
        const manualSpeed = document.getElementById('manualSpeed');
        const speedValue = document.getElementById('speedValue');

        if(manualSpeed && speedValue) {
            manualSpeed.addEventListener('input', (e) => {
                speedValue.textContent = e.target.value;
            });
        }

        let sendControlCommand = async (action) => {
            const speed = manualSpeed ? parseInt(manualSpeed.value) : 80;
            try {
                await fetch('/api/manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, speed })
                });
            } catch (e) {
                console.error("Manual control failed", e);
            }
        };

        // Pointer events for mobile support (touch start/end)
        dPadBtns.forEach(btn => {
            let active = false;
            
            const activate = (e) => {
                e.preventDefault();
                if(active) return;
                active = true;
                btn.style.opacity = '0.7';
                sendControlCommand(btn.dataset.action);
            };
            
            const deactivate = (e) => {
                e.preventDefault();
                if(!active) return;
                active = false;
                btn.style.opacity = '1';
                if(btn.dataset.action !== 'stop') {
                    sendControlCommand('stop');
                }
            };

            btn.addEventListener('mousedown', activate);
            btn.addEventListener('touchstart', activate, {passive: false});
            
            btn.addEventListener('mouseup', deactivate);
            btn.addEventListener('mouseleave', deactivate);
            btn.addEventListener('touchend', deactivate, {passive: false});
            btn.addEventListener('touchcancel', deactivate, {passive: false});
        });

        // Keyboard support for manual control
        let keysPressed = {};
        document.addEventListener('keydown', (e) => {
            if(!tabManual || !tabManual.classList.contains('active')) return;
            // Ignore if typing in text inputs (though input area is hidden in manual mode)
            if (e.target.tagName.toLowerCase() === 'textarea' || e.target.tagName.toLowerCase() === 'input') return;
            
            if(keysPressed[e.key]) return; // prevent repeated triggers
            keysPressed[e.key] = true;

            let actionMap = {
                'w': 'forward', 'ArrowUp': 'forward',
                's': 'backward', 'ArrowDown': 'backward',
                'a': 'left', 'ArrowLeft': 'left',
                'd': 'right', 'ArrowRight': 'right',
                ' ': 'stop'
            };
            
            let action = actionMap[e.key];
            
            // Handles diagonals basic
            if ((keysPressed['w'] || keysPressed['ArrowUp']) && (keysPressed['a'] || keysPressed['ArrowLeft'])) action = 'fwd_left';
            if ((keysPressed['w'] || keysPressed['ArrowUp']) && (keysPressed['d'] || keysPressed['ArrowRight'])) action = 'fwd_right';
            if ((keysPressed['s'] || keysPressed['ArrowDown']) && (keysPressed['a'] || keysPressed['ArrowLeft'])) action = 'bwd_left';
            if ((keysPressed['s'] || keysPressed['ArrowDown']) && (keysPressed['d'] || keysPressed['ArrowRight'])) action = 'bwd_right';

            if(action) {
                e.preventDefault();
                // Find corresponding button to visually highlight
                document.querySelectorAll(`.d-pad-btn[data-action="${action}"]`).forEach(btn => btn.style.opacity = '0.7');
                sendControlCommand(action);
            }
        });

        document.addEventListener('keyup', (e) => {
            if(!tabManual || !tabManual.classList.contains('active')) return;
            
            keysPressed[e.key] = false;
            
            // Evaluate if any keys are still pressed
            let anyDirectionKey = ['w', 'a', 's', 'd', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].find(k => keysPressed[k]);
            
            // Revert all opacities
            document.querySelectorAll(`.d-pad-btn`).forEach(btn => btn.style.opacity = '1');

            if(!anyDirectionKey) {
                sendControlCommand('stop');
            } else {
                // If some keys are still held, send the updated direction
                let action = '';
                if ((keysPressed['w'] || keysPressed['ArrowUp']) && (keysPressed['a'] || keysPressed['ArrowLeft'])) action = 'fwd_left';
                else if ((keysPressed['w'] || keysPressed['ArrowUp']) && (keysPressed['d'] || keysPressed['ArrowRight'])) action = 'fwd_right';
                else if ((keysPressed['s'] || keysPressed['ArrowDown']) && (keysPressed['a'] || keysPressed['ArrowLeft'])) action = 'bwd_left';
                else if ((keysPressed['s'] || keysPressed['ArrowDown']) && (keysPressed['d'] || keysPressed['ArrowRight'])) action = 'bwd_right';
                else if (keysPressed['w'] || keysPressed['ArrowUp']) action = 'forward';
                else if (keysPressed['s'] || keysPressed['ArrowDown']) action = 'backward';
                else if (keysPressed['a'] || keysPressed['ArrowLeft']) action = 'left';
                else if (keysPressed['d'] || keysPressed['ArrowRight']) action = 'right';
                
                if (action) {
                    document.querySelectorAll(`.d-pad-btn[data-action="${action}"]`).forEach(btn => btn.style.opacity = '0.7');
                    sendControlCommand(action);
                }
            }
        });
    </script>
</body>

</html>
